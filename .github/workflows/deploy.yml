name: Sentinel Deployment
on:
    push:
        branches:
            - main
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
            - name: Login to Docker Hub
              run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
            - name: Build and Push our Docker image
              run: |
                  docker build -t ${{secrets.DOCKER_USERNAME}}/sentinel:latest .
                  docker push ${{secrets.DOCKER_USERNAME}}/sentinel:latest
            - name: Deploy to EC2
              uses: appleboy/ssh-action@master
              with:
                    host: ${{ secrets.EC2_HOST }}
                    username: ${{ secrets.EC2_USER }}
                    key: ${{ secrets.EC2_SSH_KEY }}
                    script: |
                        docker pull ${{secrets.DOCKER_USERNAME}}/sentinel:latest
                        docker stop sentinel || true
                        docker rm sentinel || true
                        docker run -d --name sentinel -p 80:80 ${{secrets.DOCKER_USERNAME}}/sentinel:latest